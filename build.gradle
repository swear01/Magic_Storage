    addModdingDependenciesTo sourceSets.ironFurnacesFixture
    addModdingDependenciesTo sourceSets.farmersDelightFixture
    addModdingDependenciesTo sourceSets.modernIndustrializationFixture
    addModdingDependenciesTo sourceSets.arsNouveauFixture
    addModdingDependenciesTo sourceSets.evilCraftFixture
    addModdingDependenciesTo sourceSets.powahFixture
    addModdingDependenciesTo sourceSets.industrialForegoingFixture
    addModdingDependenciesTo sourceSets.createFixture
    addModdingDependenciesTo sourceSets.pneumaticCraftFixture
    addModdingDependenciesTo sourceSets.compatibilityMatrixFixture

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
        magic_storage_recipe_fixture {
            sourceSet(sourceSets.recipeAddonFixture)
        }
        magic_storage_mekanism_fixture {
            sourceSet(sourceSets.mekanismFixture)
        }
        magic_storage_botania_fixture {
