def botaniaFixtureRuntime = configurations.named("botaniaFixtureRuntimeClasspath")
def expectedBotaniaFixtureSha256 = botania_ci_sha256.toString()
tasks.register("verifyBotaniaFixtureArtifact") {
    inputs.files(botaniaFixtureRuntime)
    inputs.property("expectedSha256", expectedBotaniaFixtureSha256)
    doLast {
        def artifacts = inputs.files.files.findAll {
                    it.name.startsWith("botania-neoforge-1.21.1-")
                            && it.name.endsWith(".jar")
                }
        if (artifacts.size() != 1) {
            throw new GradleException(
                    "Botania CI fixture verification expected one resolved Botania jar, found ${artifacts.size()}")
        }
        def digest = java.security.MessageDigest.getInstance("SHA-256")
        artifacts.iterator().next().withInputStream { input ->
            byte[] buffer = new byte[8192]
            for (int read = input.read(buffer); read != -1; read = input.read(buffer)) {
                digest.update(buffer, 0, read)
            }
        }
        def actual = digest.digest().encodeHex().toString()
        def expected = inputs.properties.expectedSha256.toString()
        if (actual != expected) {
            throw new GradleException(
                    "Botania CI fixture SHA-256 mismatch: expected ${expected}, got ${actual}")
        }
    }
}

tasks.named("compileBotaniaFixtureJava").configure {
    dependsOn tasks.named("verifyBotaniaFixtureArtifact")
}

