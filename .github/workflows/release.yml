name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Check tag matches mod_version
        run: |
          VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2)"
          TAG="$GITHUB_REF_NAME"
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag $TAG does not match gradle.properties mod_version=$VERSION" >&2
            exit 1
          fi

      - name: Build
        run: ./gradlew build --console=plain --no-daemon

      - name: Run GameTest server
        run: ./gradlew runGameTestServer --console=plain --no-daemon

      - name: Run script tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover scripts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/libs/magic_storage-*.jar \
            --title "Magic Storage $GITHUB_REF_NAME" \
            --notes "Automated release for Magic Storage $GITHUB_REF_NAME."
