name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Prepare CI logs
        run: mkdir -p build/ci-logs

      - name: Check tag matches mod_version
        run: |
          VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2)"
          TAG="$GITHUB_REF_NAME"
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag $TAG does not match gradle.properties mod_version=$VERSION" >&2
            exit 1
          fi

      - name: Build
        run: |
          set -o pipefail
          ./gradlew build --console=plain --no-daemon 2>&1 | tee build/ci-logs/build.log

      - name: Verify minimum and latest compatible EMI releases
        run: |
          set -o pipefail
          MIN_EMI="$(sed -n 's/^emi_version=//p' gradle.properties)"
          MIN_EMI_RUNTIME="$(sed -n 's/^emi_runtime_version=//p' gradle.properties)"
          LATEST_EMI="$(python3 scripts/resolve_emi_version.py)"
          LATEST_EMI_RUNTIME="$(python3 scripts/resolve_emi_runtime.py "$LATEST_EMI")"
          ./gradlew compileJava -Pemi_version="$MIN_EMI" -Pemi_runtime_version="$MIN_EMI_RUNTIME" --console=plain --no-daemon 2>&1 | tee build/ci-logs/emi-minimum.log
          ./gradlew compileJava -Pemi_version="$LATEST_EMI" -Pemi_runtime_version="$LATEST_EMI_RUNTIME" --rerun-tasks --console=plain --no-daemon 2>&1 | tee build/ci-logs/emi-latest.log

      - name: Run GameTest server
        run: |
          set -o pipefail
          ./gradlew runGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/gametest.log

      - name: Run recipe addon GameTest server
        run: |
          set -o pipefail
          ./gradlew runRecipeAddonGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/recipe-addon-gametest.log

      - name: Run Mekanism chemical GameTest server
        run: |
          set -o pipefail
          ./gradlew runMekanismGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/mekanism-gametest.log

      - name: Run script tests
        run: |
          set -o pipefail
          PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover scripts 2>&1 | tee build/ci-logs/python-unittest.log

      - name: Check datagen drift
        run: |
          set -o pipefail
          MIN_EMI="$(sed -n 's/^emi_version=//p' gradle.properties)"
          MIN_EMI_RUNTIME="$(python3 scripts/resolve_emi_runtime.py "$MIN_EMI")"
          bash scripts/stage_emi_runtime.sh "$MIN_EMI" "$MIN_EMI_RUNTIME" 2>&1 | tee build/ci-logs/emi-runtime.log
          ./gradlew runData --console=plain --no-daemon 2>&1 | tee build/ci-logs/datagen.log
          if [ -n "$(git status --porcelain -- src/generated/resources src/main/resources)" ]; then
            echo "Datagen changed tracked or generated resources; run ./gradlew runData and commit the result." >&2
            git status --short -- src/generated/resources src/main/resources
            git diff -- src/generated/resources src/main/resources
            exit 1
          fi

      - name: Generate release notes
        run: |
          mkdir -p build
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG_COMMIT}^" 2>/dev/null || true)"
          {
            echo "## Magic Storage ${GITHUB_REF_NAME}"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
              git log --pretty='- %s (%h)' "${PREVIOUS_TAG}..${TAG_COMMIT}"
            else
              echo "Initial release changes:"
              git log --pretty='- %s (%h)' "${TAG_COMMIT}"
            fi
          } > build/release-notes.md

      - name: Upload release logs and reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: magic-storage-release-logs
          path: |
            build/ci-logs/**
            run/logs/**
            run/crash-reports/**
            build/reports/**
            build/release-notes.md
          if-no-files-found: warn
          retention-days: 14

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/libs/magic_storage-*.jar \
            --title "Magic Storage $GITHUB_REF_NAME" \
            --notes-file build/release-notes.md
