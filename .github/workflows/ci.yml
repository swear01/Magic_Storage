name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build
        run: ./gradlew build --console=plain --no-daemon

      - name: Run GameTest server
        run: ./gradlew runGameTestServer --console=plain --no-daemon

      - name: Run script tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover scripts

      - name: Upload mod jar
        uses: actions/upload-artifact@v7
        with:
          name: magic-storage-jar
          path: build/libs/magic_storage-*.jar
          if-no-files-found: error
