name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Prepare CI logs
        run: mkdir -p build/ci-logs

      - name: Build
        run: |
          set -o pipefail
          ./gradlew build --console=plain --no-daemon 2>&1 | tee build/ci-logs/build.log

      - name: Verify minimum and latest compatible EMI releases
        run: |
          set -o pipefail
          MIN_EMI="$(sed -n 's/^emi_version=//p' gradle.properties)"
          MIN_EMI_RUNTIME="$(sed -n 's/^emi_runtime_version=//p' gradle.properties)"
          LATEST_EMI="$(python3 scripts/resolve_emi_version.py)"
          LATEST_EMI_RUNTIME="$(python3 scripts/resolve_emi_runtime.py "$LATEST_EMI")"
          ./gradlew compileJava -Pemi_version="$MIN_EMI" -Pemi_runtime_version="$MIN_EMI_RUNTIME" --console=plain --no-daemon 2>&1 | tee build/ci-logs/emi-minimum.log
          ./gradlew compileJava -Pemi_version="$LATEST_EMI" -Pemi_runtime_version="$LATEST_EMI_RUNTIME" --rerun-tasks --console=plain --no-daemon 2>&1 | tee build/ci-logs/emi-latest.log

      - name: Run GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/gametest.log

      - name: Run recipe addon GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runRecipeAddonGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/recipe-addon-gametest.log

      - name: Run Mekanism GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runMekanismGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/mekanism-gametest.log

      - name: Run Botania GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runBotaniaGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/botania-gametest.log

      - name: Run Iron Furnaces GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runIronFurnacesGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/iron-furnaces-gametest.log

      - name: Run Farmer's Delight GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runFarmersDelightGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/farmers-delight-gametest.log

      - name: Run Modern Industrialization GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runModernIndustrializationGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/modern-industrialization-gametest.log

      - name: Run Ars Nouveau GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runArsNouveauGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/ars-nouveau-gametest.log

      - name: Run EvilCraft GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runEvilCraftGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/evilcraft-gametest.log

      - name: Run Powah GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runPowahGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/powah-gametest.log

      - name: Run Industrial Foregoing GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runIndustrialForegoingGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/industrial-foregoing-gametest.log

      - name: Run Create GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runCreateGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/create-gametest.log

      - name: Run PneumaticCraft GameTest server
        run: |
          set -o pipefail
          python3 -c 'import shutil; shutil.rmtree("run/world", ignore_errors=True)'
          ./gradlew runPneumaticCraftGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/pneumaticcraft-gametest.log

      - name: Run script tests
        run: |
          set -o pipefail
          PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover scripts 2>&1 | tee build/ci-logs/python-unittest.log

      - name: Check datagen drift
        run: |
          set -o pipefail
          MIN_EMI="$(sed -n 's/^emi_version=//p' gradle.properties)"
          MIN_EMI_RUNTIME="$(python3 scripts/resolve_emi_runtime.py "$MIN_EMI")"
          bash scripts/stage_emi_runtime.sh "$MIN_EMI" "$MIN_EMI_RUNTIME" 2>&1 | tee build/ci-logs/emi-runtime.log
          ./gradlew runData --console=plain --no-daemon 2>&1 | tee build/ci-logs/datagen.log
          if [ -n "$(git status --porcelain -- src/generated/resources src/main/resources)" ]; then
            echo "Datagen changed tracked or generated resources; run ./gradlew runData and commit the result." >&2
            git status --short -- src/generated/resources src/main/resources
            git diff -- src/generated/resources src/main/resources
            exit 1
          fi

      - name: Upload CI logs and reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: magic-storage-ci-logs
          path: |
            build/ci-logs/**
            run/logs/**
            run/crash-reports/**
            build/reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload mod jar
        uses: actions/upload-artifact@v7
        with:
          name: magic-storage-jar
          path: build/libs/magic_storage-*.jar
          if-no-files-found: error
