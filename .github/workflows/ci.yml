name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Prepare CI logs
        run: mkdir -p build/ci-logs

      - name: Build
        run: |
          set -o pipefail
          ./gradlew build --console=plain --no-daemon 2>&1 | tee build/ci-logs/build.log

      - name: Verify minimum and latest compatible EMI API
        run: |
          set -o pipefail
          MIN_EMI="$(sed -n 's/^emi_version=//p' gradle.properties)"
          LATEST_EMI="$(python3 scripts/resolve_emi_version.py)"
          ./gradlew compileJava -Pemi_version="$MIN_EMI" --console=plain --no-daemon 2>&1 | tee build/ci-logs/emi-minimum.log
          ./gradlew compileJava -Pemi_version="$LATEST_EMI" --rerun-tasks --console=plain --no-daemon 2>&1 | tee build/ci-logs/emi-latest.log

      - name: Run GameTest server
        run: |
          set -o pipefail
          ./gradlew runGameTestServer --console=plain --no-daemon 2>&1 | tee build/ci-logs/gametest.log

      - name: Run script tests
        run: |
          set -o pipefail
          PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover scripts 2>&1 | tee build/ci-logs/python-unittest.log

      - name: Check datagen drift
        run: |
          set -o pipefail
          MIN_EMI="$(sed -n 's/^emi_version=//p' gradle.properties)"
          MIN_EMI_RUNTIME="$(python3 scripts/resolve_emi_runtime.py "$MIN_EMI")"
          bash scripts/stage_emi_runtime.sh "$MIN_EMI" "$MIN_EMI_RUNTIME" 2>&1 | tee build/ci-logs/emi-runtime.log
          ./gradlew runData --console=plain --no-daemon 2>&1 | tee build/ci-logs/datagen.log
          if [ -n "$(git status --porcelain -- src/generated/resources src/main/resources)" ]; then
            echo "Datagen changed tracked or generated resources; run ./gradlew runData and commit the result." >&2
            git status --short -- src/generated/resources src/main/resources
            git diff -- src/generated/resources src/main/resources
            exit 1
          fi

      - name: Upload CI logs and reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: magic-storage-ci-logs
          path: |
            build/ci-logs/**
            run/logs/**
            run/crash-reports/**
            build/reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload mod jar
        uses: actions/upload-artifact@v7
        with:
          name: magic-storage-jar
          path: build/libs/magic_storage-*.jar
          if-no-files-found: error
